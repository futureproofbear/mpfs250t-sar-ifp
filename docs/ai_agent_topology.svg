<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="4.5" refY="7" orient="0">
      <path d="M1,1 L4.5,7 L8,1" fill="none" stroke="#64748b" stroke-width="1.5"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="780" height="400" fill="#ffffff"/>

  <!-- Orchestrator -->
  <rect x="300" y="18" width="180" height="56" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8"/>
  <text x="390" y="42" text-anchor="middle" font-size="15" font-weight="700" fill="#3730a3">Orchestrator / Judge</text>
  <text x="390" y="61" text-anchor="middle" font-size="11" fill="#4338ca">routes &#183; holds the loop &#183; decides &#8220;done&#8221;</text>

  <!-- connectors -->
  <line x1="390" y1="74" x2="390" y2="100" stroke="#64748b" stroke-width="1.5"/>
  <line x1="140" y1="100" x2="640" y2="100" stroke="#64748b" stroke-width="1.5"/>
  <line x1="140" y1="100" x2="140" y2="124" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="390" y1="100" x2="390" y2="124" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="640" y1="100" x2="640" y2="124" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Agent 1: Ingestion & Triage -->
  <rect x="28" y="126" width="224" height="250" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.4"/>
  <rect x="28" y="126" width="224" height="6" rx="3" fill="#0ea5e9"/>
  <circle cx="52" cy="156" r="14" fill="#0ea5e9"/>
  <text x="52" y="161" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">1</text>
  <text x="76" y="153" font-size="14" font-weight="700" fill="#0f172a">Ingestion &amp; Triage</text>
  <text x="76" y="169" font-size="10.5" fill="#64748b">the machine-domain parser</text>
  <text x="44" y="196" font-size="11.5" fill="#334155">Raw JTAG / ILA hex + register</text>
  <text x="44" y="213" font-size="11.5" fill="#334155">maps &#8594; semantic JSON state.</text>
  <text x="44" y="236" font-size="11.5" fill="#334155">Establishes ground-truth</text>
  <text x="44" y="253" font-size="11.5" fill="#334155">runtime execution state.</text>
  <text x="44" y="276" font-size="11.5" font-style="italic" fill="#0369a1">Does NOT fix code &#8212;</text>
  <text x="44" y="293" font-size="11.5" font-style="italic" fill="#0369a1">only reports what IS.</text>

  <!-- Agent 2: Architectural Critic -->
  <rect x="278" y="126" width="224" height="250" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.4"/>
  <rect x="278" y="126" width="224" height="6" rx="3" fill="#f59e0b"/>
  <circle cx="302" cy="156" r="14" fill="#f59e0b"/>
  <text x="302" y="161" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">2</text>
  <text x="326" y="153" font-size="14" font-weight="700" fill="#0f172a">Architectural Critic</text>
  <text x="326" y="169" font-size="10.5" fill="#64748b">the hardware-wise brain</text>
  <text x="294" y="196" font-size="11.5" fill="#334155">Judges by concurrency,</text>
  <text x="294" y="213" font-size="11.5" fill="#334155">arbitration, CDC, AXI4 /</text>
  <text x="294" y="230" font-size="11.5" fill="#334155">APB / Avalon handshakes.</text>
  <text x="294" y="253" font-size="11.5" fill="#334155">Hunts shared-resource</text>
  <text x="294" y="270" font-size="11.5" fill="#334155">contention + circular deps.</text>
  <text x="294" y="293" font-size="11.5" font-style="italic" fill="#b45309">Assumes SW claims false</text>
  <text x="294" y="310" font-size="11.5" font-style="italic" fill="#b45309">if the pathway is blocked.</text>

  <!-- Agent 3: Synthesis & Repair -->
  <rect x="528" y="126" width="224" height="250" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.4"/>
  <rect x="528" y="126" width="224" height="6" rx="3" fill="#8b5cf6"/>
  <circle cx="552" cy="156" r="14" fill="#8b5cf6"/>
  <text x="552" y="161" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">3</text>
  <text x="576" y="153" font-size="14" font-weight="700" fill="#0f172a">Synthesis &amp; Repair</text>
  <text x="576" y="169" font-size="10.5" fill="#64748b">the co-design generator</text>
  <text x="544" y="196" font-size="11.5" fill="#334155">Localized patches in HLS</text>
  <text x="544" y="213" font-size="11.5" fill="#334155">C++, Verilog/SV, and C.</text>
  <text x="544" y="236" font-size="11.5" fill="#334155">Bound by the Critic's</text>
  <text x="544" y="253" font-size="11.5" fill="#334155">timing / structural rules.</text>
  <text x="544" y="276" font-size="11.5" font-style="italic" fill="#6d28d9">Each patch states its</text>
  <text x="544" y="293" font-size="11.5" font-style="italic" fill="#6d28d9">pragmas + stream dests.</text>
</svg>
